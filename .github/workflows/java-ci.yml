name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Java/Gradle tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Discover and run Gradle tests
        run: |
          set -e
          echo "Looking for Gradle projects (build.gradle)"
          found=0
          while IFS= read -r proj; do
            # skip Gradle cache and wrapper directories
            if echo "$proj" | grep -q "\.gradle"; then
              continue
            fi
            echo "== Running gradle test for: $proj"
            gradle -p "$proj" test --no-daemon --console=plain
            found=1
          done < <(find . -name 'build.gradle' -not -path './**/.gradle/*' -exec dirname {} \; | sort -u)
          if [ "$found" -eq 0 ]; then
            echo "No Gradle projects found; skipping Java tests"
          fi
