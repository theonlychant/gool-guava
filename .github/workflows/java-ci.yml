name: Java CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Java/Gradle tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Run java/cpuhelper tests
        run: |
          gradle -p java/cpuhelper test --no-daemon --console=plain

      - name: Run src/guava-build tests
        run: |
          if [ -d src/guava-build ]; then gradle -p src/guava-build test --no-daemon --console=plain; fi

      - name: Run barmix/java tests
        run: |
          if [ -d barmix/java ]; then gradle -p barmix/java test --no-daemon --console=plain; fi
