name: Go CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Run go test per module
        run: |
          go version
          # find all module directories (directories containing go.mod)
          for mod in $(find . -name 'go.mod' -not -path './vendor/*' -exec dirname {} \; | sort -u); do
            echo "== testing module: $mod"
            (cd "$mod" && go test ./... -v)
          done
